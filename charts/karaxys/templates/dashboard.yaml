apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "karaxys.fullname" . }}-dashboard
  labels: {{- include "karaxys.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels: {{- include "karaxys.selector" (dict "ctx" . "component" "dashboard") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "karaxys.selector" (dict "ctx" . "component" "dashboard") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dashboard
          image: {{ include "karaxys.image" (dict "ctx" . "svc" "dashboard") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            # Runtime API URL — resolved in the browser via /config.js, no rebuild.
            - name: KARAXYS_API_BASE_URL
              value: {{ .Values.urls.apiBaseUrl | quote }}
          ports:
            - containerPort: 7000
          readinessProbe:
            httpGet: { path: /, port: 7000 }
            initialDelaySeconds: 15
            periodSeconds: 15
          resources: {{- toYaml .Values.dashboard.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "karaxys.fullname" . }}-dashboard
  labels: {{- include "karaxys.labels" . | nindent 4 }}
spec:
  selector: {{- include "karaxys.selector" (dict "ctx" . "component" "dashboard") | nindent 4 }}
  ports:
    - name: http
      port: 7000
      targetPort: 7000
