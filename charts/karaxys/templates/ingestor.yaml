apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "karaxys.fullname" . }}-ingestor
  labels: {{- include "karaxys.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ingestor.replicas }}
  selector:
    matchLabels: {{- include "karaxys.selector" (dict "ctx" . "component" "ingestor") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "karaxys.selector" (dict "ctx" . "component" "ingestor") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ingestor
          image: {{ include "karaxys.image" (dict "ctx" . "svc" "ingestor") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom: {{- include "karaxys.backendEnvFrom" . | nindent 12 }}
          env:
            - name: KARAXYS_INGESTOR_ADDR
              value: ":8082"
          ports:
            - containerPort: 8082
          readinessProbe:
            httpGet: { path: /healthz, port: 8082 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources: {{- toYaml .Values.ingestor.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "karaxys.fullname" . }}-ingestor
  labels: {{- include "karaxys.labels" . | nindent 4 }}
spec:
  selector: {{- include "karaxys.selector" (dict "ctx" . "component" "ingestor") | nindent 4 }}
  ports:
    - name: http
      port: 8082
      targetPort: 8082
