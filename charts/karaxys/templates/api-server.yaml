apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "karaxys.fullname" . }}-api-server
  labels: {{- include "karaxys.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.apiServer.replicas }}
  selector:
    matchLabels: {{- include "karaxys.selector" (dict "ctx" . "component" "api-server") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "karaxys.selector" (dict "ctx" . "component" "api-server") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api-server
          image: {{ include "karaxys.image" (dict "ctx" . "svc" "api-server") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom: {{- include "karaxys.backendEnvFrom" . | nindent 12 }}
          ports:
            - containerPort: 8081
          # api-server has no unauthenticated health route, so probe the socket.
          readinessProbe:
            tcpSocket: { port: 8081 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 8081 }
            initialDelaySeconds: 30
            periodSeconds: 15
          resources: {{- toYaml .Values.apiServer.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "karaxys.fullname" . }}-api-server
  labels: {{- include "karaxys.labels" . | nindent 4 }}
spec:
  selector: {{- include "karaxys.selector" (dict "ctx" . "component" "api-server") | nindent 4 }}
  ports:
    - name: http
      port: 8081
      targetPort: 8081
