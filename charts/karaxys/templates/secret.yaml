{{- $mongoUser := .Values.secrets.mongoUsername -}}
{{- $mongoPass := include "karaxys.requireSecret" (dict "name" "mongoPassword" "val" .Values.secrets.mongoPassword) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "karaxys.fullname" . }}-secrets
  labels: {{- include "karaxys.labels" . | nindent 4 }}
type: Opaque
stringData:
  KARAXYS_SECRET_KEY_B64: {{ include "karaxys.requireSecret" (dict "name" "secretKeyB64" "val" .Values.secrets.secretKeyB64) | quote }}
  KARAXYS_API_KEY: {{ include "karaxys.requireSecret" (dict "name" "apiKey" "val" .Values.secrets.apiKey) | quote }}
  KARAXYS_AGENT_TOKEN: {{ include "karaxys.requireSecret" (dict "name" "agentToken" "val" .Values.secrets.agentToken) | quote }}
  KARAXYS_REDIS_PASSWORD: {{ include "karaxys.requireSecret" (dict "name" "redisPassword" "val" .Values.secrets.redisPassword) | quote }}
  # Object store credentials
  KARAXYS_OBJECTSTORE_ACCESS_KEY_ID: {{ .Values.secrets.minioUsername | quote }}
  KARAXYS_OBJECTSTORE_SECRET_ACCESS_KEY: {{ include "karaxys.requireSecret" (dict "name" "minioPassword" "val" .Values.secrets.minioPassword) | quote }}
  # Mongo connection string (embeds credentials)
  MONGO_URI: {{ printf "mongodb://%s:%s@%s-mongodb:27017/?directConnection=true&authSource=admin" $mongoUser $mongoPass (include "karaxys.fullname" .) | quote }}
  # Raw values reused by the bundled data-service StatefulSets
  MONGO_ROOT_USERNAME: {{ $mongoUser | quote }}
  MONGO_ROOT_PASSWORD: {{ $mongoPass | quote }}
  MINIO_ROOT_USER: {{ .Values.secrets.minioUsername | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.secrets.minioPassword | quote }}
